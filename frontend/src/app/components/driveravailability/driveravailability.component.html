 <h1>Availability</h1><div class="page-wrapper">


  <div class="page-header">
    <h2>My Availability</h2>
  </div>


  <p class="error-msg" *ngIf="loadError">{{ loadError }}</p>
  <p class="loading-msg" *ngIf="loading">Loading availability...</p>


  <form (ngSubmit)="saveAvailability()" #availabilityForm="ngForm" *ngIf="!loading">
    <div class="main-content-wrap">
      <div class="orders-card">


        <div class="form-section">
          <h3 class="section-heading">Available Days (Weekly)</h3>
          <p class="section-desc">Select which days of the week you are typically available.</p>
          <div class="days-grid">
            <label *ngFor="let day of dayKeys" class="day-checkbox">
              <input
                type="checkbox"
                [ngModel]="availableDays[day]"
                (ngModelChange)="availableDays[day] = $event"
                [name]="'day_' + day"
              />
              <span class="day-label">{{ getDayLabel(day) }}</span>
            </label>
          </div>
        </div>


        <div class="form-actions">
          <button type="submit" [disabled]="saving">
            {{ saving ? 'Saving...' : 'Save Availability' }}
          </button>
          <p class="success-msg" *ngIf="saveMessage">{{ saveMessage }}</p>
        </div>


      </div>
    </div>
  </form>


</div>
