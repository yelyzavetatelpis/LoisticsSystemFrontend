<div class="main-layout">


    <app-sidebar></app-sidebar>


    <div class="content-area">


        <!-- top bar with user avatar and dropdown -->
        <div class="top-bar">
            <div class="user-dropdown">


                <!-- avatar generated from the users first name -->
                <img src="https://ui-avatars.com/api/?name={{ (currentUser$ | async)?.username }}&background=7a1212&color=fff&rounded=true"
                    alt="Avatar" (click)="toggleUserDropdown()">


                <!-- dropdown for when avatar is clicked -->
                <div class="dropdown-menu" *ngIf="showUserDropdown">
                    <div class="dropdown-header">
                        <strong>{{ (currentUser$ | async)?.username }}</strong>
                        <small>{{ (currentUser$ | async)?.role }}</small>
                    </div>
                    <hr>
                    <button class="dropdown-item" (click)="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>


            </div>
        </div>



        <router-outlet></router-outlet>


    </div>


</div>
