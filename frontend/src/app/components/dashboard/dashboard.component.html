<div class="dashboard-container">


  <div class="page-header">
    <h1 class="greeting">Good {{ timeOfDay }}, {{ adminName }}</h1>
    <p class="date-line">{{ currentDate }}</p>
  </div>
<div class="export-bar">
    <button class="export-btn" (click)="exportPdf()">Export as PDF</button>
</div>
  <div class="main-content">


    <div class="stats-grid">


      <!-- Pie Chart -->
      <div class="stat-card">
        <span class="card-title">Orders by Status</span>
        <canvas id="ordersPieChart"></canvas>
      </div>


      <!-- Bar Chart -->
      <div class="stat-card">
        <span class="card-title">Revenue (Last Month)</span>
        <canvas id="revenueBarChart"></canvas>
      </div>


      <!-- Line Chart -->
     <div class="stat-card">
  <span class="card-title">Orders per Week</span>
  <canvas id="ordersLineChart"></canvas>
</div>


    </div>
<div class="tables-section">
  <h2>KPIs</h2>
  <div class="orders-table-card">
    <div class="orders-table-wrapper">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Category</th>
            <th>Metric</th>
            <th>Value</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of metrics">
            <td>{{ m.category }}</td>
            <td>{{ m.metric }}</td>
            <td>{{ m.value }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>


  </div>


</div>
