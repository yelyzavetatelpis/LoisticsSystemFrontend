<div class="page-wrapper">


  <div class="page-header">
    <h2 class="greeting">User Management</h2>
  </div>


  <div class="orders-card">
    <div class="accounts-top-bar">
      <button class="btn-create" (click)="createUser()">+ Create User</button>
    </div>


    <div class="orders-table-wrapper">
      <table class="orders-table">
        <thead>
          <tr>
            <th>No.</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ user.firstName }}</td>
            <td>{{ user.lastName }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.mobileNumber }}</td>
            <td>
              <div class="action-buttons">
                <button class="btn-edit" (click)="editUser(user)">Edit</button>
                <button class="btn-delete" (click)="openDeleteModal(user.userId)">Delete</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>


  </div>


  <!-- delete confirmation -->
  <div class="modal-backdrop" *ngIf="showDeleteModal" (click)="closeDeleteModal()"></div>
  <div class="modal-dialog" *ngIf="showDeleteModal">
    <div class="modal-content" (click)="$event.stopPropagation()">


      <div class="modal-header">
        <h3 class="modal-title">Delete User</h3>
        <button class="modal-close" (click)="closeDeleteModal()">&times;</button>
      </div>


      <div class="modal-body">
        <p>Are you sure you want to delete this user? This action cannot be undone.</p>
      </div>


      <div class="modal-footer">
        <button class="btn-cancel-action" (click)="closeDeleteModal()">Cancel</button>
        <button class="btn-confirm-delete" (click)="confirmDelete()">Delete</button>
      </div>


    </div>
  </div>


</div>


<!-- messages for success or error -->
<div class="toast" *ngIf="toastMessage" [class.toast-error]="toastType === 'error'">
  <i class="bi" [class.bi-check-circle]="toastType === 'success'" [class.bi-exclamation-circle]="toastType === 'error'"></i>
  {{ toastMessage }}
</div>
