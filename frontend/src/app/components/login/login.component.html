<!-- page layout -->
<div class="container">
  <div class="page-wrapper">

    <!-- left side: Name of the company and register link -->
    <div class="brand">
      <h1>LogiFlow <i class="bi bi-box-seam"></i></h1>
      <p class="register-link">Don't have an account yet? <a routerLink="/register">Register here!</a></p>
    </div>

    <!-- right side: login form  -->
    <div class="card">
      <h2>Sign In</h2>
      <p>Sign in to manage your shipments</p>

      <!-- ngForm to track validation state across all inputs -->
      <form #loginForm="ngForm" (ngSubmit)="onSubmit()">

        <!-- email field with Angular email validation -->
        <div class="input-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required email #emailField="ngModel">
          <span class="field-error" *ngIf="emailField.touched && emailField.invalid">Please enter a valid email</span>
        </div>

       <!-- password field with length, letter and special character validation -->
<div class="input-group">
  <label>Password</label>
  <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required minlength="6" pattern="(?=.*[a-zA-Z])(?=.*[!@#$%^&*]).{6,}" #passwordField="ngModel">
  <span class="field-error" *ngIf="passwordField.touched && passwordField.invalid">Password should be at least 6 characters, have at least 1 letter and at least 1 special character</span>
</div>

        <div class="btn-wrapper">
          <button type="submit">Submit</button>
        </div>

      </form>
    </div>

  </div>
</div>
