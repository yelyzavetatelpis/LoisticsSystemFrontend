<div class="container">
  <div class="page-wrapper">


    <!-- Logo and welcome -->
    <div class="brand">
      <div class="brand-title">
        <h1>BLogistics <i class="bi bi-box-seam"></i></h1>
      </div>
      <p class="register-link">Don't have an account? <a routerLink="/register">Register here!</a></p>
    </div>


    <!-- login form -->
    <div class="card">
      <div class="card-header">
        <h2>Sign In <i class="bi bi-box-seam"></i></h2>
      </div>


      <form #loginForm="ngForm" (ngSubmit)="onSubmit()">


        <!-- email -->
        <div class="input-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required email
            #emailField="ngModel">
          <span class="field-error" *ngIf="emailField.touched && emailField.invalid">
            Please enter a valid email
          </span>
        </div>


        <!-- password -->
        <div class="input-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required
            minlength="6" #passwordField="ngModel">
          <span class="field-error" *ngIf="passwordField.touched && passwordField.invalid">
            Password must be at least 6 characters
          </span>
        </div>


        <!-- show error from server if login fails -->
        <p class="error-msg" *ngIf="error">{{ error }}</p>


        <div class="btn-wrapper">
          <button type="submit">Submit</button>
        </div>


      </form>
    </div>


  </div>
</div>
